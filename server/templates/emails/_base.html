<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{appName}}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f4f6f8;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }

      table {
        border-collapse: collapse;
      }

      .wrapper {
        width: 100%;
        background: #f4f6f8;
        padding: 32px 16px;
      }

      .container {
        width: 100%;
        max-width: 560px;
        background: #ffffff;
        border-radius: 16px;
        overflow: hidden;
      }

      .header,
      .content,
      .footer {
        padding: 24px;
      }

      .header {
        border-bottom: 1px solid #e5e7eb;
        font-size: 18px;
        font-weight: 700;
      }

      .content {
        font-size: 15px;
        line-height: 1.6;
      }

      h1 {
        margin: 0 0 16px;
        color: #111827;
        font-size: 24px;
        line-height: 1.25;
      }

      p {
        margin: 0 0 16px;
      }

      .btn {
        display: inline-block;
        margin: 8px 0 20px;
        padding: 12px 18px;
        border-radius: 10px;
        background: #2563eb;
        color: #ffffff !important;
        font-weight: 700;
        text-decoration: none;
      }

      .muted {
        color: #6b7280;
        font-size: 13px;
      }

      .footer {
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 12px;
        line-height: 1.5;
      }

      .footer a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <table role="presentation" class="wrapper" width="100%">
      <tr>
        <td align="center">
          <table role="presentation" class="container" width="100%">
            <tr>
              <td class="header">{{appName}}</td>
            </tr>
            <tr>
              <td class="content">{{content}}</td>
            </tr>
            <tr>
              <td class="footer">
                <p>You're receiving this because you have an account on {{appName}}.</p>
                <p><a href="#">Unsubscribe</a></p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
